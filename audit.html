<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Log</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div id="sidebar-container"></div>
  <main class="main">
    <div class="topbar" data-permission="View Audit">
      <div class="topbar-title">Audit Log</div>
      <div class="topbar-right"></div>
    </div>

    <div class="content">
      <div class="toolbar">
        <div class="toolbar-left"></div>
        <button class="btn" onclick="loadAudit()">Refresh</button>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>When</th><th>Table</th><th>Record</th><th>Action</th><th>By</th><th>Data</th></tr>
            </thead>
            <tbody id="audit-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="app-common.js"></script>
<script src="audit.js"></script>
</body>
</html>
