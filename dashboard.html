<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · openARMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="app">
  <div id="sidebar-container"></div>
  <main class="main">
    <div class="topbar">
      <div class="topbar-title">Dashboard</div>
      <div class="topbar-right">
        <span id="alert-count-badge" class="alert-badge" style="display:none">0 alerts</span>
        <div class="avatar">A</div>
      </div>
    </div>

    <div class="content">
      <div class="dashboard-controls">
        <label for="alert-shelter">Show alerts for</label>
        <select id="alert-shelter"></select>
      </div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-icon primary"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg></div>
          <div class="stat-label">Total Items</div>
          <div class="stat-value" id="s-items">–</div>
          <div class="stat-sub">inventory types</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon mid"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>
          <div class="stat-label">Total Qty</div>
          <div class="stat-value" id="s-qty">–</div>
          <div class="stat-sub">units in stock</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon warning"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
          <div class="stat-label">Low Stock</div>
          <div class="stat-value" id="s-low">–</div>
          <div class="stat-sub">items need restock</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon danger"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <div class="stat-label">Expired</div>
          <div class="stat-value" id="s-exp">–</div>
          <div class="stat-sub">items past expiry</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon accent"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
          <div class="stat-label">Donations</div>
          <div class="stat-value" id="s-don">–</div>
          <div class="stat-sub">total records</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon info"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
          <div class="stat-label">Suppliers</div>
          <div class="stat-value" id="s-sup">–</div>
          <div class="stat-sub">registered vendors</div>
        </div>
      </div>

      <div class="grid-3" style="margin-bottom:20px;">
        <div class="card">
          <div class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg> Stock by Category</div>
          <div id="category-breakdown"></div>
        </div>
        <div class="card">
          <div class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Recent Activity</div>
          <div id="recent-activity"></div>
        </div>
        <div class="card">
          <div class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> Active Alerts</div>
          <div id="dashboard-alerts"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="app-common.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
