<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelters</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div id="sidebar-container"></div>
  <main class="main">
    <div class="topbar">
      <div class="topbar-title">Shelters</div>
      <div class="topbar-right"></div>
    </div>

    <div class="content">
      <div class="toolbar">
        <div class="toolbar-left"></div>
        <button class="btn btn-primary" onclick="openAddShelter()">+ Add Shelter</button>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Name</th><th>Address</th><th>Contact</th><th>Capacity</th><th>Type</th><th>Created</th><th></th></tr>
            </thead>
            <tbody id="sh-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-shelter">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Add Shelter</h2>
      <button class="modal-close" onclick="closeModal('modal-shelter')">×</button>
    </div>
    <div class="form-grid">
      <input type="hidden" id="sh-id">
      <div class="form-group full"><label>Name *</label><input type="text" id="sh-name" placeholder="Shelter name"></div>
      <div class="form-group full"><label>Address</label><input type="text" id="sh-address" placeholder="Street, City"></div>
      <div class="form-group"><label>Contact Person</label><input type="text" id="sh-contact" placeholder="Contact person name"></div>
      <div class="form-group"><label>Contact Number</label><input type="text" id="sh-contact-number" placeholder="Phone number"></div>
      <div class="form-group"><label>Capacity</label><input type="number" id="sh-capacity" placeholder="Number of people"></div>
      <div class="form-group"><label>Shelter Type</label><input type="text" id="sh-type" placeholder="Major or minor"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-shelter')">Cancel</button>
      <button class="btn btn-primary" onclick="saveShelter()">Save</button>
    </div>
  </div>
</div>

<script src="app-common.js"></script>
<script src="shelters_admin.js"></script>
</body>
</html>
