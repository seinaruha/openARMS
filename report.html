<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports</title>
  <style>
    :root {
      --primary: #1a6b4a;
      --primary-light: #e8f5ee;
      --primary-mid: #2d9166;
      --primary-dark: #0f4a32;
      --accent: #e67e22;
      --accent-light: #fef3e8;
      --info: #5b5fc7;
      --info-light: #eeeefb;
      --danger: #c0392b;
      --danger-light: #fdecea;
      --warning: #d68910;
      --warning-light: #fef9e7;
      --gray-50: #f8f9fa;
      --gray-100: #f1f3f5;
      --gray-200: #e9ecef;
      --gray-300: #dee2e6;
      --gray-400: #adb5bd;
      --gray-500: #868e96;
      --gray-600: #6c757d;
      --gray-700: #495057;
      --gray-800: #343a40;
      --gray-900: #212529;
      --sidebar-bg: #122019;
      --sidebar-active: #f4f7f5;
      --radius-sm: 10px;
      --radius: 16px;
      --radius-lg: 20px;
      --shadow: 0 1px 3px rgba(16,24,20,0.06), 0 1px 2px rgba(16,24,20,0.04);
      --shadow-md: 0 10px 26px rgba(16,24,20,0.09), 0 2px 6px rgba(16,24,20,0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif; background: #f0f4f2; color: var(--gray-900); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; z-index: 100; flex-shrink: 0; }
    .sidebar-brand { padding: 22px 20px 18px; }
    .sidebar-brand .logo { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
    .sidebar-brand .logo-icon { width: 54px; height: 54px; background: var(--primary); border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 14px rgba(26,107,74,0.45); overflow: hidden; margin-bottom: 2px; }
    .sidebar-brand .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
    .sidebar-brand h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; line-height: 1.1; margin: 0; text-align: center; }
    .sidebar-nav { flex: 1; padding: 14px 10px; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 11px; padding: 10px 13px; border-radius: 11px; cursor: pointer; font-size: 13.5px; transition: background 0.15s, color 0.15s; color: rgba(255,255,255,0.62); margin-bottom: 3px; text-decoration: none; font-weight: 500; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
    .nav-item.active { background: var(--sidebar-active); color: var(--primary-dark); font-weight: 700; box-shadow: 0 6px 16px rgba(0,0,0,0.28); }
    .nav-item .nav-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sidebar-footer { padding: 15px 20px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; opacity: 0.4; }
    .main { flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: #fff; padding: 0 32px; height: 62px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: var(--gray-900); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .content { padding: 28px 32px; flex: 1; }
    .card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 22px 24px; }
    .card-title { font-size: 14.5px; font-weight: 700; color: var(--gray-800); margin-bottom: 18px; display: flex; align-items: center; gap: 9px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    th { background: var(--gray-50); color: var(--gray-600); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
    td { padding: 11px 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-50); }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 11.5px; font-weight: 600; }
    .badge-food { background: #e3f4e8; color: #1e6b31; }
    .badge-medicine { background: #eae3f4; color: #4a1e6b; }
    .badge-supplies { background: #e3eef4; color: #1e4a6b; }
    .badge-ok { background: var(--primary-light); color: var(--primary); }
    .badge-low { background: var(--warning-light); color: var(--warning); }
    .badge-expired { background: var(--danger-light); color: var(--danger); }
    .badge-expiring { background: var(--warning-light); color: var(--warning); }
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar-left { flex: 1; display: flex; gap: 10px; flex-wrap: wrap; }
    select.filter-select { width: auto; padding: 8px 11px; border: 1px solid var(--gray-200); border-radius: 7px; font-size: 13.5px; font-family: inherit; }
    .btn { padding: 8px 16px; border-radius: 7px; border: none; cursor: pointer; font-size: 13.5px; font-weight: 500; font-family: inherit; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #165a3d; }
    .btn-secondary { background: var(--gray-100); color: var(--gray-800); }
    .btn-secondary:hover { background: var(--gray-200); }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-600); }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; }
    #toast { position: fixed; bottom: 24px; right: 24px; background: var(--gray-900); color: #fff; padding: 12px 18px; border-radius: 8px; font-size: 13.5px; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.25s; }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { background: var(--primary); }
    @media (max-width: 900px) {
      .sidebar { width: 58px; }
      .sidebar .nav-label, .sidebar-brand h1, .sidebar-brand p, .sidebar-footer { display: none; }
    }
    @media print {
      .topbar, .toolbar, button { display: none; }
      .card { box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>

<div class="app">
  <div id="sidebar-container"></div>
  <main class="main">
    <div class="topbar">
      <div class="topbar-title">Reports</div>
      <div class="topbar-right">
        <span style="font-size:13px;color:var(--gray-600);">Admin </span>
      </div>
    </div>

    <div class="content">
      <div class="toolbar">
        <div class="toolbar-left">
          <select class="filter-select" id="rpt-shelter" onchange="loadReport()">
            <option value="">All Shelters</option>
          </select>
        </div>
        <button class="btn btn-secondary" onclick="printReport()">🖨️ Print Report</button>
      </div>
      <div class="card" id="report-card">
        <div class="card-title">📊 Inventory Status Report</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Item</th><th>Category</th><th>Shelter</th><th>Qty</th><th>Unit</th><th>Min Stock</th><th>Expiry</th><th>Stock Status</th><th>Expiry Status</th></tr>
            </thead>
            <tbody id="rpt-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:5000/api';
let allShelters = [];

fetch('sidebar.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('sidebar-container').innerHTML = html;
    document.querySelectorAll('.nav-item')[5].classList.add('active');
  });

function fmt(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-PH', {month:'short',day:'numeric',year:'numeric'});
}

async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

async function loadReport() {
  if (!allShelters.length) allShelters = await api('/shelters');
  populateShelterFilters();
  const shel = document.getElementById('rpt-shelter').value;
  const rows = await api('/reports/inventory' + (shel ? '?shelter_id='+shel : ''));
  document.getElementById('rpt-tbody').innerHTML = rows.length ? rows.map(r => `
    <tr>
      <td><strong>${r.name}</strong></td>
      <td><span class="badge badge-${r.category.toLowerCase()}">${r.category}</span></td>
      <td style="font-size:13px;color:var(--gray-600)">${r.shelter_name || '—'}</td>
      <td><strong>${r.quantity}</strong></td>
      <td style="font-size:12.5px">${r.unit}</td>
      <td style="font-size:12.5px;color:var(--gray-600)">${r.min_stock}</td>
      <td style="font-size:12.5px">${r.expiry_date ? fmt(r.expiry_date) : '—'}</td>
      <td>${r.stock_status === 'Low' ? '<span class="badge badge-low">Low</span>' : '<span class="badge badge-ok">OK</span>'}</td>
      <td>${r.expiry_status === 'Expired' ? '<span class="badge badge-expired">Expired</span>' : r.expiry_status === 'Expiring Soon' ? '<span class="badge badge-expiring">Soon</span>' : '<span class="badge badge-ok">Good</span>'}</td>
    </tr>
  `).join('') : '<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">📊</div><p>No data</p></div></td></tr>';
}

function populateShelterFilters() {
  const el = document.getElementById('rpt-shelter');
  if (!el) return;
  el.innerHTML = '<option value="">All Shelters</option>' +
    allShelters.map(s => `<option value="${s.shelter_id}">${s.name}</option>`).join('');
}

function printReport() {
  window.print();
}

loadReport();
</script>
</body>
</html>
